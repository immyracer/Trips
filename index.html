<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trips</title>
<style>
  :root{
    --paper:#fbf9f5; --page:#f1ede4; --ink:#16202c; --muted:#8d8674; --faint:#a9a294;
    --line:#e4dccd; --dash:#d7cebd; --ocean:#17475c; --teal:#2f6b7d; --coral:#c2643f;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--page);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}

  .mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px}

  /* ================= PASSWORD GATE ================= */
  #gate{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;padding:24px;
    background:linear-gradient(190deg,#0e2233 0%,#17475c 46%,#3d8391 100%)}
  #gate .sun{position:absolute;top:10%;right:-70px;width:300px;height:300px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,224,178,.3),rgba(255,224,178,0) 64%);pointer-events:none}

  .pass{position:relative;width:100%;max-width:350px;background:var(--paper);border-radius:18px;overflow:hidden;
    box-shadow:0 26px 64px rgba(0,0,0,.36)}
  .pass .stub{padding:20px 22px 18px;border-bottom:2px dashed var(--dash);position:relative}
  .pass .row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .pass .brand{font-family:var(--serif);font-size:1.6rem;letter-spacing:-.4px;line-height:1.1}
  .pass .who{font-size:.62rem;color:var(--muted);text-align:right;line-height:1.6}
  .route{display:flex;align-items:flex-end;gap:12px;margin-top:18px}
  .route .pt{display:flex;flex-direction:column;gap:2px}
  .route .code{font-family:var(--mono);font-size:1.5rem;font-weight:600;letter-spacing:1px;line-height:1}
  .route .city{font-family:var(--mono);font-size:.55rem;color:var(--faint)}
  .route .dash{flex:1;height:1px;margin-bottom:9px;position:relative;
    background:repeating-linear-gradient(90deg,var(--dash) 0 5px,transparent 5px 10px)}
  .route .dash::after{content:"✈";position:absolute;right:-5px;top:-9px;font-size:.8rem;color:var(--teal)}
  .notch{position:absolute;width:22px;height:22px;border-radius:50%;bottom:-13px;background:#1a5169}
  .notch.l{left:-11px} .notch.r{right:-11px}

  .pass .body{padding:20px 22px 22px}
  .lbl{font-family:var(--mono);font-size:.6rem;color:var(--faint);margin-bottom:8px}
  .pass input{width:100%;padding:13px 14px;border:1px solid var(--line);background:#fff;border-radius:10px;
    font-size:1rem;text-align:center;font-family:inherit;outline:none;color:var(--ink);transition:border-color .18s}
  .pass input:focus{border-color:var(--teal)}
  .pass input::placeholder{color:#c3bcad}
  .pass button{width:100%;margin-top:10px;padding:13px;border-radius:10px;font-size:.92rem;font-weight:600;
    font-family:inherit;cursor:pointer;background:var(--ink);color:var(--paper);border:none;transition:background .18s}
  .pass button:hover{background:var(--teal)}
  .pass .err{color:#b8442f;font-size:.76rem;text-align:center;margin-top:10px;display:none}
  .pass .meta{display:flex;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .pass .meta div{font-family:var(--mono);font-size:.58rem;color:var(--faint)}

  /* ================= DEPARTURE BOARD HEADER ================= */
  .board{background:linear-gradient(190deg,#0e2233 0%,#17475c 100%);color:#fff;padding:30px 22px 34px;position:relative;overflow:hidden}
  .board .sun{position:absolute;top:-70px;right:-50px;width:260px;height:260px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,224,178,.26),rgba(255,224,178,0) 64%)}
  .board-in{max-width:900px;margin:0 auto;position:relative}
  .board .kick{font-family:var(--mono);font-size:.62rem;color:rgba(255,255,255,.6)}
  .board h1{font-family:var(--serif);font-size:2.6rem;letter-spacing:-1px;margin-top:6px;line-height:1}
  .board .sub{color:rgba(255,255,255,.62);font-size:.86rem;margin-top:8px}
  .flip{display:flex;gap:6px;margin-top:18px;flex-wrap:wrap}
  .flip span{font-family:var(--mono);font-size:.58rem;padding:5px 9px;border-radius:4px;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.82)}

  /* ================= TICKET TILES ================= */
  .wrap{max-width:900px;margin:0 auto;padding:26px 18px 60px}
  .seclbl{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:.62rem;color:var(--muted);margin:24px 2px 14px}
  .seclbl::after{content:"";flex:1;height:1px;background:var(--line)}

  .tickets{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
  .ticket{position:relative;display:block;background:var(--paper);border:1px solid var(--line);border-radius:16px;
    overflow:hidden;text-decoration:none;color:inherit;box-shadow:0 1px 2px rgba(22,32,44,.04),0 10px 28px rgba(22,32,44,.07);
    transition:transform .2s ease,box-shadow .2s ease}
  .ticket:hover{transform:translateY(-4px);box-shadow:0 2px 6px rgba(22,32,44,.06),0 20px 44px rgba(22,32,44,.14)}

  .t-stub{padding:16px 18px 15px;border-bottom:2px dashed var(--dash);position:relative}
  .t-top{display:flex;justify-content:space-between;align-items:center}
  .t-name{font-family:var(--serif);font-size:1.24rem;letter-spacing:-.3px}
  .t-badge{font-family:var(--mono);font-size:.54rem;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .t-badge.up{background:#e7f0ec;color:#1f6b4f;border:1px solid #c8e0d5}
  .t-badge.plan{background:#fbf0e2;color:#96601b;border:1px solid #edd9bb}
  .t-badge.done{background:#eeebe4;color:#7d7768;border:1px solid #ded8cb}
  .t-notch{position:absolute;width:20px;height:20px;border-radius:50%;bottom:-12px;background:var(--page)}
  .t-notch.l{left:-11px} .t-notch.r{right:-11px}

  .t-body{padding:15px 18px 17px}
  .t-grid{display:flex;justify-content:space-between;gap:14px}
  .t-cell .k{font-family:var(--mono);font-size:.54rem;color:var(--faint);margin-bottom:3px}
  .t-cell .v{font-size:.86rem;font-weight:600}
  .t-cell.r{text-align:right}
  .t-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .t-foot .go{font-size:.82rem;font-weight:700;display:inline-flex;align-items:center;gap:6px}
  .t-foot .go .arw{transition:transform .2s}
  .ticket:hover .t-foot .go .arw{transform:translateX(4px)}
  .t-foot .seat{font-family:var(--mono);font-size:.54rem;color:var(--faint)}

  /* add-a-trip */
  .add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;
    border:1.5px dashed var(--dash);border-radius:16px;padding:28px 18px;color:var(--muted);min-height:196px;background:rgba(251,249,245,.5)}
  .add .ring{width:44px;height:44px;border-radius:50%;border:1.5px dashed var(--dash);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--faint)}
  .add .txt{font-family:var(--mono);font-size:.58rem;max-width:180px;line-height:1.8}

  .foot{text-align:center;margin-top:38px;font-family:var(--mono);font-size:.58rem;color:var(--faint)}

  @media(max-width:560px){ .board h1{font-size:2.1rem} .board{padding:26px 20px 30px} }
</style>
</head>
<body>

<!-- ================= PASSWORD GATE ================= -->
<div id="gate">
  <div class="sun"></div>
  <div class="pass">
    <div class="stub">
      <div class="row">
        <div>
          <div class="mono" style="font-size:.6rem;color:var(--muted)">Boarding pass</div>
          <div class="brand">Trips</div>
        </div>
        <div class="who mono">Imran<br>&amp; Shezila</div>
      </div>
      <div class="route">
        <div class="pt"><div class="code">DFW</div><div class="city">Dallas</div></div>
        <div class="dash"></div>
        <div class="pt" style="text-align:right"><div class="code">WLD</div><div class="city">Anywhere</div></div>
      </div>
      <div class="notch l"></div><div class="notch r"></div>
    </div>
    <div class="body">
      <div class="lbl">Password</div>
      <input id="pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()">
      <button onclick="unlock()">Unlock</button>
      <div class="err" id="err">Incorrect password — try again</div>
      <div class="meta"><div>Private</div><div>One Porch</div></div>
    </div>
  </div>
</div>

<script>
(function(){
  var PW='oneporch', SK='oneporch_auth';
  function unlock(){
    if(document.getElementById('pw').value===PW){
      localStorage.setItem(SK,'1');
      document.getElementById('gate').style.display='none';
      document.body.style.overflow='';
    } else {
      document.getElementById('err').style.display='block';
      document.getElementById('pw').value='';
    }
  }
  window.unlock=unlock;
  if(localStorage.getItem(SK)!=='1'){
    document.getElementById('gate').style.display='flex';
    document.body.style.overflow='hidden';
  }
})();
</script>

<!-- ================= DEPARTURE BOARD ================= -->
<div class="board">
  <div class="sun"></div>
  <div class="board-in">
    <div class="kick">Departures</div>
    <h1>Trips</h1>
    <div class="sub">Every itinerary in one place — tap a pass to open it</div>
    <div class="flip">
      <span id="chip-count">—</span><span>Imran &amp; Shezila</span>
    </div>
  </div>
</div>

<div class="wrap">

  <div class="seclbl">Upcoming</div>
  <div class="tickets" id="tickets"></div>

  <div class="foot">🔒 Private · One Porch</div>

</div>

<script>
/* ============================================================
   TRIPS — the only thing you edit to add or update a trip.
   Set `date` to the departure date "YYYY-MM-DD" once known.
   Tiles auto-sort soonest first; undated trips keep the order
   below and sit after any dated ones.
   `href` null = tile renders greyed with "Itinerary coming soon".
   ============================================================ */
var TRIPS = [
  { name:'Cayman Islands', to:'GCM', toCity:'Grand Cayman', date:'2026-07-30', end:'2026-08-02', href:'Cayman_Itinerary_2026.html' },
  { name:'Newport Beach',  to:'SNA', toCity:'Santa Ana', date:'2026-09-25', end:'2026-09-27', href:'Newport_Beach_Itinerary_2026.html' },
  { name:'Nashville',      to:'BNA', toCity:'Nashville',     date:null, end:null, href:null },
  { name:'Vail',           to:'EGE', toCity:'Eagle / Vail',  date:null, end:null, href:null },
  { name:'Bahamas',        to:'NAS', toCity:'Nassau',        date:null, end:null, href:null },
  { name:'Paris',          to:'CDG', toCity:'Charles de Gaulle', date:null, end:null, href:null },
  { name:'Turkey',         to:'IST', toCity:'Istanbul',      date:null, end:null, href:null }
];

(function(){
  var FROM='DFW', FROM_CITY='Dallas';

  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmt(iso){
    if(!iso) return 'To be confirmed';
    var p=iso.split('-');
    return M[parseInt(p[1],10)-1]+' '+parseInt(p[2],10)+', '+p[0];
  }
  /* full trip range, e.g. "Jul 30 – Aug 2, 2026" (drops repeated year/month) */
  function fmtRange(a,b){
    if(!a) return 'To be confirmed';
    if(!b) return fmt(a);
    var pa=a.split('-'), pb=b.split('-');
    var ma=M[parseInt(pa[1],10)-1], da=parseInt(pa[2],10), ya=pa[0];
    var mb=M[parseInt(pb[1],10)-1], db=parseInt(pb[2],10), yb=pb[0];
    if(ya!==yb) return ma+' '+da+', '+ya+' – '+mb+' '+db+', '+yb;
    if(ma!==mb) return ma+' '+da+' – '+mb+' '+db+', '+yb;
    return ma+' '+da+' – '+db+', '+yb;
  }
  function yr(iso){ return iso ? iso.split('-')[0] : '—'; }

  /* dated trips ascending, then undated in declared order */
  var sorted = TRIPS.map(function(t,i){ return {t:t,i:i}; }).sort(function(a,b){
    if(a.t.date && b.t.date) return a.t.date < b.t.date ? -1 : (a.t.date > b.t.date ? 1 : a.i-b.i);
    if(a.t.date) return -1;
    if(b.t.date) return 1;
    return a.i-b.i;
  }).map(function(x){ return x.t; });

  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  var html = sorted.map(function(t){
    var live = !!t.href;
    var open = live
      ? '<a class="ticket" href="'+esc(t.href)+'">'
      : '<div class="ticket" style="opacity:.72">';
    var close = live ? '</a>' : '</div>';
    var cta = live
      ? '<span class="go">Open itinerary <span class="arw">&rarr;</span></span>'
      : '<span class="go" style="color:var(--faint);font-weight:600">Itinerary coming soon</span>';
    return open+
      '<div class="t-stub">'+
        '<div class="t-top">'+
          '<div class="t-name">'+esc(t.name)+'</div>'+
          '<div class="t-badge plan">Planning</div>'+
        '</div>'+
        '<div class="route" style="margin-top:14px">'+
          '<div class="pt"><div class="code" style="font-size:1.3rem">'+FROM+'</div><div class="city">'+FROM_CITY+'</div></div>'+
          '<div class="dash"></div>'+
          '<div class="pt" style="text-align:right"><div class="code" style="font-size:1.3rem">'+esc(t.to)+'</div><div class="city">'+esc(t.toCity)+'</div></div>'+
        '</div>'+
        '<div class="t-notch l"></div><div class="t-notch r"></div>'+
      '</div>'+
      '<div class="t-body">'+
        '<div class="t-grid">'+
          '<div class="t-cell"><div class="k">Departs</div><div class="v">'+fmt(t.date)+'</div></div>'+
          '<div class="t-cell r"><div class="k">Status</div><div class="v">Planning</div></div>'+
        '</div>'+
        '<div class="t-foot">'+cta+'<span class="seat">'+yr(t.date)+'</span></div>'+
      '</div>'+
    close;
  }).join('');

  html += '<div class="add"><div class="ring">＋</div><div class="txt">Next trip appears here</div></div>';

  document.getElementById('tickets').innerHTML = html;
  document.getElementById('chip-count').textContent =
    sorted.length + ' upcoming';
})();
</script>

</body>
</html>
