<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option C — Boarding pass</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;overflow:hidden}

  .stage{position:relative;height:100%;display:flex;align-items:center;justify-content:center;padding:24px;
    background:linear-gradient(190deg,#0e2233 0%,#17475c 46%,#3d8391 100%)}
  .sun{position:absolute;top:12%;right:-60px;width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,224,178,.32),rgba(255,224,178,0) 64%)}

  .pass{position:relative;width:100%;max-width:340px;background:#fbf9f5;border-radius:18px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.34)}

  .stub{padding:20px 22px 16px;border-bottom:2px dashed #ddd5c6;position:relative}
  .stub .row{display:flex;justify-content:space-between;align-items:flex-start}
  .brand{font-family:Georgia,"Times New Roman",serif;font-size:1.5rem;letter-spacing:-.4px;color:#16202c}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.66rem;letter-spacing:1.4px;color:#8d8674;text-transform:uppercase}
  .route{display:flex;align-items:center;gap:10px;margin-top:16px}
  .code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:1.5rem;font-weight:600;color:#16202c;letter-spacing:1px}
  .dash{flex:1;height:1px;background:repeating-linear-gradient(90deg,#cdc5b6 0 5px,transparent 5px 10px);position:relative}
  .dash::after{content:"✈";position:absolute;right:-4px;top:-9px;font-size:.8rem;color:#2f6b7d}

  .notch{position:absolute;width:22px;height:22px;border-radius:50%;background:#17475c;bottom:-13px}
  .notch.l{left:-11px} .notch.r{right:-11px}

  .body{padding:20px 22px 22px}
  .lbl{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.62rem;letter-spacing:1.6px;color:#a0998a;text-transform:uppercase;margin-bottom:8px}
  .body input{width:100%;padding:13px 14px;border:1px solid #ddd5c6;background:#fff;border-radius:10px;font-size:.98rem;
    text-align:center;font-family:inherit;outline:none;color:#16202c;transition:border-color .18s}
  .body input:focus{border-color:#2f6b7d}
  .body input::placeholder{color:#b3ac9d}
  .body button{width:100%;margin-top:10px;padding:13px;border-radius:10px;font-size:.92rem;font-weight:600;font-family:inherit;
    cursor:pointer;background:#16202c;color:#fbf9f5;border:none;transition:background .18s}
  .body button:hover{background:#2f6b7d}
  .meta{display:flex;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid #eee7da}
  .meta div{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.6rem;letter-spacing:1.2px;color:#a0998a;text-transform:uppercase}
  .tagpill{position:fixed;top:14px;left:14px;background:rgba(0,0,0,.5);color:#fff;font-size:.7rem;padding:6px 12px;border-radius:20px;letter-spacing:1px;z-index:5}
</style>
</head>
<body>
<div class="tagpill">OPTION C · BOARDING PASS</div>
<div class="stage">
  <div class="sun"></div>
  <div class="pass">
    <div class="stub">
      <div class="row">
        <div>
          <div class="mono">Boarding pass</div>
          <div class="brand">Trips</div>
        </div>
        <div class="mono" style="text-align:right">Imran<br>&amp; Shezila</div>
      </div>
      <div class="route">
        <div class="code">DFW</div>
        <div class="dash"></div>
        <div class="code">GCM</div>
      </div>
      <div class="notch l"></div>
      <div class="notch r"></div>
    </div>
    <div class="body">
      <div class="lbl">Password</div>
      <input type="password" placeholder="••••••••">
      <button>Unlock</button>
      <div class="meta">
        <div>Private</div>
        <div>One Porch</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
