<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option B — Editorial</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#f4f1ea;color:#1e2733;overflow:hidden}

  .stage{position:relative;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

  .topmark{position:absolute;top:26px;left:0;right:0;text-align:center;font-family:Georgia,"Times New Roman",serif;
    font-size:.95rem;letter-spacing:.5px;color:#1e2733}
  .topmark .dot{color:#c2643f}

  .rule{width:34px;height:1px;background:#cdc5b6;margin:0 auto}

  .kicker{font-size:.66rem;letter-spacing:4px;text-transform:uppercase;color:#8d8674;font-weight:600;margin-bottom:20px}
  .mark{font-family:Georgia,"Times New Roman",serif;font-size:4.2rem;line-height:1;letter-spacing:-1.5px;color:#16202c}
  .sub{color:#7d7768;font-size:.88rem;margin-top:14px;margin-bottom:26px}

  .field{width:100%;max-width:290px;display:flex;flex-direction:column;gap:12px}
  .field input{width:100%;padding:13px 16px;border:1px solid #d8d0c1;background:#fbf9f5;border-radius:10px;font-size:.98rem;
    text-align:center;font-family:inherit;outline:none;color:#1e2733;transition:border-color .18s}
  .field input:focus{border-color:#2f6b7d}
  .field input::placeholder{color:#a9a294}
  .field button{width:100%;padding:13px;border-radius:10px;font-size:.92rem;font-weight:600;font-family:inherit;cursor:pointer;
    background:#16202c;color:#f4f1ea;border:none;transition:background .18s}
  .field button:hover{background:#2f6b7d}

  .foot{position:absolute;bottom:26px;left:0;right:0;text-align:center;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:#a9a294}

  .horizon{position:absolute;left:0;right:0;bottom:0;height:34%;
    background:linear-gradient(180deg,rgba(47,107,125,0) 0%,rgba(47,107,125,.07) 60%,rgba(47,107,125,.13) 100%);pointer-events:none}
  .tagpill{position:fixed;top:14px;left:14px;background:rgba(0,0,0,.5);color:#fff;font-size:.7rem;padding:6px 12px;border-radius:20px;letter-spacing:1px;z-index:5}
</style>
</head>
<body>
<div class="tagpill">OPTION B · EDITORIAL</div>
<div class="stage">
  <div class="horizon"></div>
  <div class="topmark">✦ Trips <span class="dot">·</span> <span style="color:#8d8674;font-size:.8rem;">Imran &amp; Shezila</span></div>

  <div class="kicker">Private</div>
  <div class="mark">Trips</div>
  <div class="rule" style="margin-top:22px"></div>
  <div class="sub">Enter your password to continue</div>

  <div class="field">
    <input type="password" placeholder="Password">
    <button>Unlock</button>
  </div>

  <div class="foot">One Porch</div>
</div>
</body>
</html>
